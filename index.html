<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MVProShop — Coming Soon</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: url("File/storefront.webp") center/cover no-repeat fixed;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.60);
      z-index: -1;
    }

    .container {
      position: relative;
      text-align: center;
      padding: 2rem;
      max-width: 540px;
      width: 100%;
    }

    .logo {
      width: 160px;
      height: auto;
      margin-bottom: 2.5rem;
      filter: brightness(0) invert(1);
    }

    .coming-soon {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffffff;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.75);
      margin-bottom: 3rem;
    }

    .divider {
      width: 48px;
      height: 3px;
      background-color: #3ba6d4;
      margin: 0 auto 3rem;
      border-radius: 2px;
    }

    .contact-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #3ba6d4;
      margin-bottom: 1.25rem;
    }

    .contact-item {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 0.75rem;
      line-height: 1.6;
    }

    .contact-item a {
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .contact-item a:hover {
      color: #3ba6d4;
    }
  </style>
</head>
<body>
  <div class="overlay"></div>

  <div class="container">
    <img class="logo" src="Logo/hres-mvpro-130.png" alt="MVProShop Logo" />

    <div class="coming-soon">Coming Soon</div>
    <p class="tagline">We're working on something great. Stay tuned.</p>

    <div class="divider"></div>

    <p class="contact-label">Have questions? Reach us at</p>

    <p class="contact-item">
      <a href="tel:+19497775887">(949) 777-5887</a>
    </p>

    <p class="contact-item">
      <a href="mailto:customerservice@mvproshop.com">customerservice@mvproshop.com</a>
    </p>

    <p class="contact-item">
      27474 Casta Del Sol<br />
      Mission Viejo, CA 92692
    </p>
  </div>
</body>
</html>
